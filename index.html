<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightshot Browser</title>
    <style>
        :root {
            --bg-body: #09090b;
            --bg-nav: #121214;
            --bg-input: #27272a;
            --bg-hover: #3f3f46;
            --bg-card: #18181b;
            --accent: #8b5cf6;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --safe-area: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- BROWSER CHROME --- */
        .browser-chrome {
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            padding-top: 8px;
            flex-shrink: 0;
            z-index: 100;
        }

        .tabs-row {
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            height: 40px;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }        .tabs-row::-webkit-scrollbar { display: none; }

        .tab {
            background: #27272a;
            color: #71717a;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            max-width: 150px;
            min-width: 100px;
            flex-shrink: 0;
            user-select: none;
        }

        .tab.active {
            background: var(--bg-body);
            color: var(--text-main);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }

        .tab-icon { font-size: 10px; }
        .tab-close { margin-left: auto; opacity: 0; font-size: 14px; border-radius: 4px; padding: 0 2px; }
        .tab.active .tab-close { opacity: 1; }
        .tab-close:active { background: #ef4444; color: white; }

        .new-tab-btn {
            padding: 6px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            margin-left: 4px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }
        .new-tab-btn:active { background: var(--bg-hover); color: white; }

        .nav-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
            height: 50px;
        }

        .nav-btn {            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            min-width: 40px;
            min-height: 40px;
        }
        .nav-btn:active { background: var(--bg-hover); color: var(--text-main); }

        .omnibox {
            flex-grow: 1;
            background: var(--bg-input);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 40px;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .omnibox:focus-within {
            background: #18181b;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .omnibox input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            font-size: 15px;
            margin-left: 8px;
        }

        /* --- VIEWPORT & CONTENT --- */
        .viewport {
            flex-grow: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;        }

        .content-scroll {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-bottom: var(--safe-area);
        }

        /* --- DASHBOARD --- */
        .dashboard {
            width: 100%;
            min-height: 100%;
            background: radial-gradient(circle at 50% -20%, #2e1065 0%, #09090b 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-align: center;
        }

        .clock {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .main-search {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .main-search input {
            background: transparent;
            border: none;
            color: white;
            flex-grow: 1;
            font-size: 16px;
        }

        .shortcuts {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: 70px;
        }

        .shortcut-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .shortcut:active .shortcut-icon { background: var(--accent); color: white; transform: scale(0.95); }
        .shortcut span { font-size: 11px; color: var(--text-muted); }

        /* --- SEARCH RESULTS UI --- */
        .search-results-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            display: none; /* Hidden by default */
        }
        .search-header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .search-header h2 { font-size: 1.2rem; color: var(--text-muted); }
        .search-header span { color: var(--accent); font-weight: bold; }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .result-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .result-thumb {
            width: 80px;
            height: 80px;
            background: #27272a;
            border-radius: 8px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .result-info h3 {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .result-info p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .loading-spinner {            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        svg { width: 20px; height: 20px; fill: currentColor; }

        @media (max-width: 600px) {
            .logo { font-size: 2.5rem; }
            .result-card { flex-direction: column; }
            .result-thumb { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

    <!-- BROWSER CHROME -->
    <div class="browser-chrome">
        <div class="tabs-row">
            <div class="tab active" id="activeTabDisplay">
                <span class="tab-icon">🌑</span>
                <span>New Tab</span>
                <span class="tab-close" onclick="resetTab(event)">×</span>
            </div>
            <div class="new-tab-btn" onclick="resetTab()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>

        <div class="nav-row">
            <button class="nav-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
            <button class="nav-btn" onclick="history.forward()"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></button>
            <button class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
            
            <div class="omnibox">
                <svg viewBox="0 0 24 24" style="color:#27c93f; width:16px; flex-shrink:0;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="text" id="urlInput" placeholder="Search Nightshot or type URL" autocomplete="off">
            </div>

            <button class="nav-btn" onclick="alert('Nightshot Settings')"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
        </div>
    </div>
    <!-- VIEWPORT -->
    <div class="viewport" id="viewport">
        <div class="content-scroll" id="contentScroll">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const contentScroll = document.getElementById('contentScroll');
        const tabTitle = document.querySelector('#activeTabDisplay span:nth-child(2)');

        function init() {
            loadDashboard();
            
            // Handle URL Bar Input
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleNavigation(urlInput.value);
                }
            });

            window.onpopstate = () => {
                checkIfDashboard();
            };
        }

        function handleNavigation(query) {
            let url = query.trim();
            if (!url) return;

            // Check if it's a URL
            if (url.includes('.') && !url.includes(' ')) {
                if (!url.startsWith('http')) url = 'https://' + url;
                window.location.href = url;
            } else {
                // It's a search query -> Internal Nightshot Search
                performInternalSearch(url);
            }
        }

        // --- INTERNAL SEARCH ENGINE (Wikipedia API) ---
        async function performInternalSearch(query) {
            tabTitle.innerText = `Search: ${query}`;
            urlInput.value = `nightshot://search/${query}`;
            
            // Show Loading State
            contentScroll.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px;">
                    <div class="loading-spinner" style="display:block"></div>                    <p style="color:var(--text-muted)">Searching the knowledge base...</p>
                </div>
            `;

            try {
                // Fetch from Wikipedia API (CORS friendly)
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=20&srsearch=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                renderSearchResults(query, data.query.search);
            } catch (error) {
                contentScroll.innerHTML = `
                    <div style="padding:40px; text-align:center;">
                        <h2 style="color:#ef4444">Search Failed</h2>
                        <p style="color:var(--text-muted)">Could not connect to knowledge base.</p>
                        <button class="nav-btn" onclick="loadDashboard()" style="margin-top:20px; display:inline-grid">Back Home</button>
                    </div>
                `;
            }
        }

        function renderSearchResults(query, results) {
            let html = `
                <div class="search-results-container" style="display:block">
                    <div class="search-header">
                        <h2>Nightshot Results for <span>"${query}"</span></h2>
                        <p style="font-size:0.8rem; color:var(--text-muted)">Powered by Wikipedia API</p>
                    </div>
            `;

            if (results.length === 0) {
                html += `<p style="color:var(--text-muted)">No results found.</p>`;
            } else {
                results.forEach(item => {
                    // Try to get an image (Page Images API) - Simplified for demo
                    // We use a placeholder gradient for now to keep it fast
                    const thumbStyle = `background: linear-gradient(45deg, #27272a, #3f3f46)`;
                    
                    html += `
                        <div class="result-card" onclick="window.open('${item.url}', '_blank')">
                            <div class="result-thumb" style="${thumbStyle}"></div>
                            <div class="result-info">
                                <h3>${item.title}</h3>
                                <p>${item.snippet}...</p>
                                <p style="font-size:0.75rem; color:#52525b; margin-top:8px">${item.url}</p>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`;
            contentScroll.innerHTML = html;
        }

        function loadDashboard() {
            tabTitle.innerText = "New Tab";
            urlInput.value = "nightshot://newtab";
            
            contentScroll.innerHTML = `
                <div class="dashboard">
                    <div class="logo">Nightshot</div>
                    <div class="clock" id="clock">00:00</div>
                    
                    <div class="main-search">
                        <svg viewBox="0 0 24 24" style="color:#aaa; width:20px; flex-shrink:0;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="dashSearch" placeholder="Search Nightshot (Internal)..." autocomplete="off">
                    </div>

                    <div class="shortcuts">
                        <div class="shortcut" onclick="window.location.href='https://github.com'">
                            <div class="shortcut-icon">🐙</div>
                            <span>GitHub</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://youtube.com'">
                            <div class="shortcut-icon">▶️</div>
                            <span>YouTube</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://reddit.com'">
                            <div class="shortcut-icon">👽</div>
                            <span>Reddit</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://twitter.com'">
                            <div class="shortcut-icon">🐦</div>
                            <span>Twitter</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('dashSearch').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    performInternalSearch(e.target.value);
                }
            });

            updateClock();
        }

        function resetTab(e) {            if(e) e.stopPropagation();
            loadDashboard();
        }

        function checkIfDashboard() {
            if (window.location.href.includes('index.html') || window.location.pathname === '/' || window.location.pathname === '') {
                loadDashboard();
            }
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = timeString;
            setTimeout(updateClock, 1000);
        }

        init();
    </script>
</body>
    </html>
