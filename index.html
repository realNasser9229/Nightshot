<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightshot v2.0</title>
    <style>
        :root {
            /* Dynamic Theme Variables */
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --bg-body: #09090b;
            --bg-nav: rgba(18, 18, 20, 0.85);
            --bg-input: #27272a;
            --bg-card: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --safe-area: env(safe-area-inset-bottom);
        }

        /* Theme Variants */
        [data-theme="crimson"] { --primary: #ef4444; --primary-glow: rgba(239, 68, 68, 0.4); }
        [data-theme="emerald"] { --primary: #10b981; --primary-glow: rgba(16, 185, 129, 0.4); }
        [data-theme="cyan"] { --primary: #06b6d4; --primary-glow: rgba(6, 182, 212, 0.4); }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
            transition: background-color 0.3s;
        }

        /* --- ANIMATED BACKGROUND --- */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, var(--primary-glow) 0%, transparent 60%);
            z-index: -1;
            opacity: 0.5;
            animation: pulseBg 10s ease-in-out infinite alternate;
        }
        @keyframes pulseBg { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.1); } }
        /* --- BROWSER CHROME --- */
        .browser-chrome {
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding-top: 8px;
            flex-shrink: 0;
            z-index: 100;
            transition: 0.3s;
        }

        .tabs-row {
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            height: 40px;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-row::-webkit-scrollbar { display: none; }

        .tab {
            background: #27272a;
            color: #71717a;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            max-width: 150px;
            min-width: 100px;
            flex-shrink: 0;
            user-select: none;
            border: 1px solid transparent;
        }

        .tab.active {
            background: var(--bg-body);
            color: var(--text-main);
            border-color: var(--border);
            border-bottom-color: var(--bg-body);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }

        .tab-icon { font-size: 10px; }
        .tab-close { margin-left: auto; opacity: 0; font-size: 14px; border-radius: 4px; padding: 0 2px; }        .tab.active .tab-close { opacity: 1; }
        .tab-close:active { background: #ef4444; color: white; }

        .new-tab-btn {
            padding: 6px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            margin-left: 4px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }
        .new-tab-btn:active { background: var(--bg-hover); color: white; }

        .nav-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
            height: 50px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            min-width: 40px;
            min-height: 40px;
            transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn.active-tool { color: var(--primary); background: rgba(139, 92, 246, 0.1); }

        .omnibox {
            flex-grow: 1;
            background: var(--bg-input);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 40px;
            border: 1px solid transparent;
            transition: 0.2s;        }

        .omnibox:focus-within {
            background: #18181b;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }

        .omnibox input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            font-size: 15px;
            margin-left: 8px;
        }

        /* --- VIEWPORT & CONTENT --- */
        .viewport {
            flex-grow: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .content-scroll {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-bottom: calc(60px + var(--safe-area)); /* Space for mobile bar */
        }

        /* --- DASHBOARD --- */
        .dashboard {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo {            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }
        .clock { font-size: 1.2rem; color: var(--text-muted); font-weight: 300; letter-spacing: 1px; }

        .main-search {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .main-search:focus-within {
            transform: scale(1.02);
            border-color: var(--primary);
            background: rgba(0,0,0,0.3);
        }
        .main-search input {
            background: transparent; border: none; color: white; flex-grow: 1; font-size: 18px;
        }

        .widgets-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .widget {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;            cursor: pointer;
            transition: 0.2s;
            min-width: 140px;
        }
        .widget:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }
        .widget-icon { font-size: 20px; }
        .widget-text { font-size: 13px; color: var(--text-muted); }
        .widget-value { font-size: 14px; color: var(--text-main); font-weight: 600; margin-top: 2px; }

        /* --- SEARCH RESULTS --- */
        .search-results-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            display: none;
        }
        .search-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .search-tabs { display: flex; gap: 20px; }
        .search-tab {
            font-size: 14px; color: var(--text-muted); cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent;
        }
        .search-tab.active { color: var(--primary); border-color: var(--primary); }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            position: relative;
        }
        .result-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .result-card.bookmarked::after {
            content: '★'; position: absolute; top: 15px; right: 15px; color: #fbbf24; font-size: 18px;
        }

        .result-thumb {
            width: 100px; height: 100px;            background: linear-gradient(45deg, #27272a, #3f3f46);
            border-radius: 8px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }
        .result-info h3 { font-size: 1.2rem; color: var(--primary); margin-bottom: 8px; }
        .result-info p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; }
        .result-meta { font-size: 0.75rem; color: #52525b; margin-top: 10px; display: flex; gap: 10px; }

        /* --- TOOLS PANELS (History, Notes, Bookmarks) --- */
        .tool-panel {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .tool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tool-title { font-size: 1.5rem; font-weight: 700; }
        
        .history-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .history-item:hover { background: rgba(255,255,255,0.02); }
        .history-time { font-size: 0.8rem; color: #52525b; }

        .notes-area {
            width: 100%;
            height: 300px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
        }

        /* --- MOBILE BOTTOM BAR --- */
        .mobile-bar {
            display: none;
            position: fixed;
            bottom: 0;            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: var(--safe-area);
        }
        .mobile-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 10px;
            background: none;
            border: none;
            cursor: pointer;
            width: 60px;
        }
        .mobile-btn.active { color: var(--primary); }
        .mobile-btn svg { width: 24px; height: 24px; fill: currentColor; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        svg { width: 20px; height: 20px; fill: currentColor; }

        @media (max-width: 768px) {
            .mobile-bar { display: flex; }
            .viewport { padding-bottom: 60px; }
            .logo { font-size: 2.5rem; }
            .tabs-row { display: none; } /* Hide tabs on mobile, use bottom bar */
            .browser-chrome { padding-top: 0; }
            .nav-row { height: 60px; }
            .result-card { flex-direction: column; }
            .result-thumb { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <!-- BROWSER CHROME -->
    <div class="browser-chrome">
        <div class="tabs-row">            <div class="tab active" id="activeTabDisplay">
                <span class="tab-icon">🌑</span>
                <span>New Tab</span>
                <span class="tab-close" onclick="resetTab(event)">×</span>
            </div>
            <div class="new-tab-btn" onclick="resetTab()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>

        <div class="nav-row">
            <button class="nav-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
            <button class="nav-btn" onclick="history.forward()"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></button>
            <button class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
            
            <div class="omnibox">
                <svg viewBox="0 0 24 24" style="color:var(--primary); width:16px; flex-shrink:0;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="text" id="urlInput" placeholder="Search Nightshot..." autocomplete="off">
            </div>

            <button class="nav-btn" id="themeBtn" onclick="cycleTheme()" title="Switch Theme"><svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg></button>
        </div>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport" id="viewport">
        <div class="content-scroll" id="contentScroll">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <div class="mobile-bar">
        <button class="mobile-btn active" onclick="loadDashboard()">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </button>
        <button class="mobile-btn" onclick="loadHistory()">
            <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            <span>History</span>
        </button>
        <button class="mobile-btn" onclick="loadNotes()">
            <svg viewBox="0 0 24 24"><path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/></svg>
            <span>Notes</span>
        </button>
        <button class="mobile-btn" onclick="loadBookmarks()">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            <span>Saved</span>
        </button>
    </div>
    <script>
        const urlInput = document.getElementById('urlInput');
        const contentScroll = document.getElementById('contentScroll');
        const tabTitle = document.querySelector('#activeTabDisplay span:nth-child(2)');
        const themeBtn = document.getElementById('themeBtn');

        // --- STATE MANAGEMENT ---
        const state = {
            history: JSON.parse(localStorage.getItem('nightshot_history')) || [],
            bookmarks: JSON.parse(localStorage.getItem('nightshot_bookmarks')) || [],
            notes: localStorage.getItem('nightshot_notes') || '',
            theme: localStorage.getItem('nightshot_theme') || 'violet'
        };

        function init() {
            applyTheme(state.theme);
            loadDashboard();
            
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleNavigation(urlInput.value);
            });

            window.onpopstate = () => checkIfDashboard();
        }

        // --- THEME ENGINE ---
        function cycleTheme() {
            const themes = ['violet', 'crimson', 'emerald', 'cyan'];
            let currentIndex = themes.indexOf(state.theme);
            state.theme = themes[(currentIndex + 1) % themes.length];
            localStorage.setItem('nightshot_theme', state.theme);
            applyTheme(state.theme);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        }

        // --- NAVIGATION ---
        function handleNavigation(query) {
            let url = query.trim();
            if (!url) return;

            if (url.includes('.') && !url.includes(' ')) {
                if (!url.startsWith('http')) url = 'https://' + url;
                window.location.href = url;
            } else {
                addToHistory(url);
                performInternalSearch(url);            }
        }

        function addToHistory(query) {
            const newItem = { query, time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString() };
            state.history.unshift(newItem);
            if (state.history.length > 50) state.history.pop();
            localStorage.setItem('nightshot_history', JSON.stringify(state.history));
        }

        // --- INTERNAL SEARCH (Wikipedia API) ---
        async function performInternalSearch(query) {
            tabTitle.innerText = `Search: ${query}`;
            urlInput.value = `nightshot://search/${query}`;
            
            contentScroll.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px;">
                    <div class="loading-spinner" style="width:40px; height:40px; border:4px solid rgba(139,92,246,0.3); border-radius:50%; border-top-color:var(--primary); animation:spin 1s infinite"></div>
                    <p style="color:var(--text-muted)">Searching Knowledge Base...</p>
                </div>
            `;

            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=20&srsearch=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderSearchResults(query, data.query.search);
            } catch (error) {
                contentScroll.innerHTML = `<div style="padding:40px; text-align:center;"><h2>Search Failed</h2><button class="nav-btn" onclick="loadDashboard()">Back Home</button></div>`;
            }
        }

        function renderSearchResults(query, results) {
            let html = `
                <div class="search-results-container" style="display:block">
                    <div class="search-header">
                        <div>
                            <h2 style="font-size:1.5rem; margin-bottom:5px;">Results for "${query}"</h2>
                            <p style="color:var(--text-muted)">Found ${results.length} articles</p>
                        </div>
                        <div class="search-tabs">
                            <div class="search-tab active">All</div>
                            <div class="search-tab">Images</div>
                            <div class="search-tab">News</div>
                        </div>
                    </div>
            `;

            results.forEach((item, index) => {
                const isBookmarked = state.bookmarks.some(b => b.title === item.title);
                html += `
                    <div class="result-card ${isBookmarked ? 'bookmarked' : ''}" onclick="window.open('${item.url}', '_blank')">
                        <div class="result-thumb"></div>
                        <div class="result-info">
                            <h3>${item.title}</h3>
                            <p>${item.snippet}...</p>
                            <div class="result-meta">
                                <span>wikipedia.org</span>
                                <span>•</span>
                                <span onclick="event.stopPropagation(); toggleBookmark('${item.title}', '${item.url}')">${isBookmarked ? '★ Saved' : '☆ Save'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            contentScroll.innerHTML = html;
        }

        // --- BOOKMARKS SYSTEM ---
        function toggleBookmark(title, url) {
            const exists = state.bookmarks.find(b => b.title === title);
            if (exists) {
                state.bookmarks = state.bookmarks.filter(b => b.title !== title);
            } else {
                state.bookmarks.push({ title, url, date: new Date().toLocaleDateString() });
            }
            localStorage.setItem('nightshot_bookmarks', JSON.stringify(state.bookmarks));
            // Refresh view if on search or bookmarks page
            if(contentScroll.innerHTML.includes('search-results-container')) {
                const query = urlInput.value.split('/').pop();
                performInternalSearch(query);
            } else if (contentScroll.innerHTML.includes('tool-panel')) {
                loadBookmarks();
            }
        }

        // --- VIEWS ---
        function loadDashboard() {
            setActiveMobileBtn(0);
            tabTitle.innerText = "New Tab";
            urlInput.value = "nightshot://newtab";
            
            contentScroll.innerHTML = `
                <div class="dashboard">
                    <div class="logo-area">
                        <div class="logo">Nightshot</div>
                        <div class="clock" id="clock">00:00</div>
                    </div>
                    
                    <div class="main-search">
                        <svg viewBox="0 0 24 24" style="color:var(--text-muted); width:24px; flex-shrink:0;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="dashSearch" placeholder="Search the web..." autocomplete="off">
                    </div>

                    <div class="widgets-row">
                        <div class="widget" onclick="loadHistory()">
                            <div class="widget-icon">🕒</div>
                            <div>
                                <div class="widget-text">History</div>
                                <div class="widget-value">${state.history.length} Items</div>
                            </div>
                        </div>
                        <div class="widget" onclick="loadBookmarks()">
                            <div class="widget-icon">★</div>
                            <div>
                                <div class="widget-text">Saved</div>
                                <div class="widget-value">${state.bookmarks.length} Pages</div>
                            </div>
                        </div>
                        <div class="widget" onclick="loadNotes()">
                            <div class="widget-icon">📝</div>
                            <div>
                                <div class="widget-text">Notes</div>
                                <div class="widget-value">${state.notes.length > 0 ? 'Active' : 'Empty'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('dashSearch').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    addToHistory(e.target.value);
                    performInternalSearch(e.target.value);
                }
            });
            updateClock();
        }

        function loadHistory() {
            setActiveMobileBtn(1);
            tabTitle.innerText = "History";
            urlInput.value = "nightshot://history";
            
            let html = `
                <div class="tool-panel" style="display:block">
                    <div class="tool-header">
                        <div class="tool-title">Browsing History</div>
                        <button class="nav-btn" onclick="state.history=[]; localStorage.setItem('nightshot_history', '[]'); loadHistory()">Clear All</button>
                    </div>
                    <div style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); overflow:hidden;">
            `;

            if (state.history.length === 0) {
                html += `<div style="padding:40px; text-align:center; color:var(--text-muted)">No history yet.</div>`;
            } else {
                state.history.forEach(item => {
                    html += `
                        <div class="history-item" onclick="performInternalSearch('${item.query}')">
                            <div>
                                <div style="font-weight:600; color:var(--text-main)">${item.query}</div>
                                <div style="font-size:12px; color:var(--text-muted)">Search Query</div>
                            </div>
                            <div class="history-time">${item.date} ${item.time}</div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            contentScroll.innerHTML = html;
        }

        function loadBookmarks() {
            setActiveMobileBtn(3);
            tabTitle.innerText = "Bookmarks";
            urlInput.value = "nightshot://bookmarks";

            let html = `
                <div class="tool-panel" style="display:block">
                    <div class="tool-header">
                        <div class="tool-title">Saved Pages</div>
                    </div>
                    <div style="display:grid; gap:15px;">
            `;

            if (state.bookmarks.length === 0) {
                html += `<div style="padding:40px; text-align:center; color:var(--text-muted)">No bookmarks saved.</div>`;
            } else {
                state.bookmarks.forEach(item => {
                    html += `
                        <div class="result-card" onclick="window.open('${item.url}', '_blank')">
                            <div class="result-info" style="flex-grow:1">
                                <h3>${item.title}</h3>
                                <div class="result-meta">
                                    <span>${item.url}</span>
                                    <span>•</span>
                                    <span style="color:#ef4444; cursor:pointer" onclick="event.stopPropagation(); toggleBookmark('${item.title}', '${item.url}')">Remove</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            contentScroll.innerHTML = html;
        }

        function loadNotes() {
            setActiveMobileBtn(2);
            tabTitle.innerText = "Quick Notes";
            urlInput.value = "nightshot://notes";

            contentScroll.innerHTML = `
                <div class="tool-panel" style="display:block">
                    <div class="tool-header">
                        <div class="tool-title">Quick Notes</div>
                        <div style="font-size:12px; color:var(--text-muted)">Auto-saved</div>
                    </div>
                    <textarea class="notes-area" id="noteArea" placeholder="Type your thoughts here...">${state.notes}</textarea>
                </div>
            `;

            const noteArea = document.getElementById('noteArea');
            noteArea.addEventListener('input', (e) => {
                state.notes = e.target.value;
                localStorage.setItem('nightshot_notes', state.notes);
            });
        }

        function resetTab(e) {
            if(e) e.stopPropagation();
            loadDashboard();
        }

        function checkIfDashboard() {
            if (window.location.href.includes('index.html') || window.location.pathname === '/' || window.location.pathname === '') {
                loadDashboard();
            }
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = timeString;
            setTimeout(updateClock, 1000);
        }

        function setActiveMobileBtn(index) {
            document.querySelectorAll('.mobile-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        init();
    </script>
</body>
</html>
