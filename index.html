<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightshot</title>
    <style>
        :root {
            --bg-body: #09090b;
            --bg-nav: #121214;
            --bg-input: #27272a;
            --bg-hover: #3f3f46;
            --accent: #8b5cf6;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- TOP BAR (TABS + NAV) --- */
        .browser-chrome {
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            padding-top: 8px;
        }

        /* Tabs Row */
        .tabs-row {
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            height: 40px;
            gap: 6px;
        }

        .tab {
            background: #27272a;
            color: #71717a;
            padding: 6px 16px;            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            max-width: 200px;
            min-width: 120px;
            transition: 0.2s;
            position: relative;
            user-select: none;
        }

        .tab.active {
            background: var(--bg-body);
            color: var(--text-main);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }

        .tab:hover:not(.active) { background: #3f3f46; }

        .tab-icon { font-size: 10px; }
        .tab-close { margin-left: auto; opacity: 0; font-size: 14px; border-radius: 4px; padding: 0 2px; }
        .tab:hover .tab-close { opacity: 1; }
        .tab-close:hover { background: #ef4444; color: white; }

        .new-tab-btn {
            padding: 6px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            margin-left: 4px;
            display: grid;
            place-items: center;
        }
        .new-tab-btn:hover { background: var(--bg-hover); color: white; }

        /* Navigation Row */
        .nav-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
            height: 44px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: grid;
            place-items: center;
        }
        .nav-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .omnibox {
            flex-grow: 1;
            background: var(--bg-input);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 32px;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .omnibox:focus-within {
            background: #18181b;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .omnibox input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            font-size: 13px;
            margin-left: 8px;
        }

        /* --- CONTENT AREA --- */
        .viewport {
            flex-grow: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- NEW TAB PAGE (DASHBOARD) --- */
        .dashboard {
            width: 100%;            height: 100%;
            background: radial-gradient(circle at 50% -20%, #2e1065 0%, #09090b 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        .clock {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .main-search {
            width: 600px;
            max-width: 90%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .main-search:hover, .main-search:focus-within {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .main-search input {
            background: transparent;            border: none;
            color: white;
            flex-grow: 1;
            font-size: 18px;
        }

        .shortcuts {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            group: hover;
        }

        .shortcut-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: 24px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .shortcut:hover .shortcut-icon {
            background: var(--accent);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
        }

        .shortcut span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* SVG Utility */
        svg { width: 18px; height: 18px; fill: currentColor; }    </style>
</head>
<body>

    <!-- BROWSER CHROME -->
    <div class="browser-chrome">
        <!-- Tabs -->
        <div class="tabs-row">
            <div class="tab active" id="activeTabDisplay">
                <span class="tab-icon">🌑</span>
                <span>New Tab</span>
                <span class="tab-close" onclick="resetTab(event)">×</span>
            </div>
            <div class="new-tab-btn" onclick="resetTab()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>

        <!-- Nav Bar -->
        <div class="nav-row">
            <button class="nav-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
            <button class="nav-btn" onclick="history.forward()"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></button>
            <button class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
            
            <div class="omnibox">
                <svg viewBox="0 0 24 24" style="color:#27c93f; width:14px;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="text" id="urlInput" placeholder="Search Google or type a URL" autocomplete="off">
            </div>

            <button class="nav-btn" onclick="alert('Nightshot Settings coming soon!')"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
        </div>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport" id="viewport">
        <!-- Content injected via JS -->
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const viewport = document.getElementById('viewport');
        const tabTitle = document.querySelector('#activeTabDisplay span:nth-child(2)');

        // --- CORE FUNCTIONS ---

        function init() {
            loadDashboard();
            
            // Handle URL Bar Input
            urlInput.addEventListener('keydown', (e) => {                if (e.key === 'Enter') {
                    handleNavigation(urlInput.value);
                }
            });

            // Handle Browser Back/Forward button visual state
            window.onpopstate = () => {
                checkIfDashboard();
            };
        }

        function handleNavigation(query) {
            let url = query.trim();
            
            if (!url) return;

            // Check if it's a URL or a Search
            if (url.includes('.') && !url.includes(' ')) {
                if (!url.startsWith('http')) url = 'https://' + url;
                window.location.href = url;
            } else {
                // It's a search query -> Google
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
            }
        }

        function loadDashboard() {
            // Update UI State
            tabTitle.innerText = "New Tab";
            urlInput.value = "nightshot://newtab";
            
            // Render Dashboard HTML
            viewport.innerHTML = `
                <div class="dashboard">
                    <div class="logo">Nightshot</div>
                    <div class="clock" id="clock">00:00</div>
                    
                    <div class="main-search">
                        <svg viewBox="0 0 24 24" style="color:#aaa; width:20px;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="dashSearch" placeholder="Search Google..." autocomplete="off">
                    </div>

                    <div class="shortcuts">
                        <div class="shortcut" onclick="window.location.href='https://github.com'">
                            <div class="shortcut-icon">🐙</div>
                            <span>GitHub</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://youtube.com'">
                            <div class="shortcut-icon">▶️</div>
                            <span>YouTube</span>                        </div>
                        <div class="shortcut" onclick="window.location.href='https://reddit.com'">
                            <div class="shortcut-icon">👽</div>
                            <span>Reddit</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://twitter.com'">
                            <div class="shortcut-icon">🐦</div>
                            <span>Twitter</span>
                        </div>
                        <div class="shortcut" onclick="window.location.href='https://startpage.com'">
                            <div class="shortcut-icon">🛡️</div>
                            <span>Startpage</span>
                        </div>
                    </div>
                </div>
            `;

            // Bind Dashboard Search
            document.getElementById('dashSearch').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleNavigation(e.target.value);
                }
            });

            updateClock();
        }

        function resetTab(e) {
            if(e) e.stopPropagation();
            // Since we can't actually close the window in a web page easily without prompts,
            // we just reload the dashboard to simulate a "New Tab"
            loadDashboard();
        }

        function checkIfDashboard() {
            // Simple check: if we are back at the original URL, show dashboard
            if (window.location.href.includes('index.html') || window.location.pathname === '/') {
                loadDashboard();
            } else {
                // If we are on another page (simulated), update title
                tabTitle.innerText = document.title || "Loading...";
                urlInput.value = window.location.href;
            }
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = timeString;            setTimeout(updateClock, 1000);
        }

        // Start
        init();

    </script>
</body>
    </html>
